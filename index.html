<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bufet na jedničku</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#fff8ef,#ffe7b8);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    background:white;
    text-align:center;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    margin-bottom:25px;
}

.logo{
    width:250px;
    max-width:100%;
}

h1{
    color:#4a2c0f;
    margin-top:10px;
    font-size:42px;
}

.slogan{
    color:#d99000;
    font-size:18px;
    margin-top:5px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#ffb300;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

input[type="number"]{
    width:80px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
}

.form-group{
    margin-top:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#4a2c0f;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.total{
    margin-top:25px;
    font-size:30px;
    text-align:center;
    font-weight:bold;
    color:#4a2c0f;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#ff9800;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.btn:hover{
    background:#e68900;
}

footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<header>
<img src="logo_bufettt.png" alt="Bufet na jedničku" class="logo">
<h1>Bufet na jedničku</h1>
<p class="slogan">Dobrá chuť, lepší den</p>
</header>

<div class="card">

<table>
    <thead>
        <tr>
            <th>Produkt</th>
            <th>Cena</th>
            <th>Počet kusů</th>
        </tr>
    </thead>
    <tbody id="vnitrekTabulky">
        <!-- Sem JavaScript automaticky doplní řádky -->
    </tbody>
</table>

<div class="total">
Celková cena: <span id="cena">0</span> Kč
</div>

<div class="form-group">
<label for="jmeno">VAŠE JMÉNO</label>
<input type="text" id="jmeno" placeholder="Příjmení Jméno" required>
</div>

<div class="form-group">
<label for="telefon">TELEFON</label>
<input type="tel" id="telefon" placeholder="+420 000 000 000" required>
</div>

<div class="form-group">
<label for="email">E-MAIL</label>
<input type="email" id="email" placeholder="vas.email@example.com" required>
</div>

<button class="btn" onclick="odeslatObjednavku()">
ODESLAT OBJEDNÁVKU
</button>

</div>

<footer>
© 2026 Bufet na jedničku | Školní frontend aplikace
</footer>

</div>

<script>
let produkty = [];

// Převodní slovník pro automatické doplnění diakritiky a emotikonů z Excelu na web
const opravyProduktu = {
    "sendvic": "🥪 Sendvič",
    "parek v rohliku": "🌭 Párek v rohlíku",
    "jablko": "🍎 Jablko",
    "tatranka": "🍫 Tatranka",
    "bageta sunkov a": "🥖 Bageta šunková",
    "bageta sunkova": "🥖 Bageta šunková",
    "ledovy caj": "🧃 Ledový čaj"
};

// Integrovaná záložní data přesně podle vašeho souboru (pro offline režim a testování)
const zalozniCsvText = `produkt;cena
sendvic;45
parek v rohliku;35
jablko;15
tatranka;30
bageta sunkov a;55
ledovy caj;35`;

// FUNKCE: Pokusí se stáhnout soubor data_bufet.csv z GitHubu, při neúspěchu použije zálohu
function nactiCenik() {
    fetch('data_bufet.csv')
    .then(response => {
        if (!response.ok) {
            throw new Error('Soubor data_bufet.csv nebyl nalezen.');
        }
        return response.text();
    })
    .then(text => {
        zpracujCsvText(text);
    })
    .catch(error => {
        console.warn('Načítání z GitHubu se nezdařilo (lokální spuštění). Používám integrovanou kopii dat.');
        zpracujCsvText(zalozniCsvText);
    });
}

// FUNKCE: Zpracování řádků textu z CSV formátu
function zpracujCsvText(text) {
    let radekPole = text.split("\n");
    produkty = []; 

    for (let i = 1; i < radekPole.length; i++) {
        let radek = radekPole[i].trim();
        if (adek === "") continue;

        let sloupce = radek.split(";");
        if (sloupce.length >= 2) {
            let suroveJmeno = sloupce[0].trim().toLowerCase();
            let cenaCislo = parseInt(sloupce[1].replace(/[^0-9]/g, "")) || 0;

            // Pokud název známe, zkrášlíme ho, jinak necháme text z Excelu
            let krasneJmeno = opravyProduktu[suroveJmeno] || (sloupce[0].trim());

            produkty.push({
                jmeno: krasneJmeno,
                cena: cenaCislo
            });
        }
    }
    vykresliTabulku();
}

// FUNKCE: Vytvoření řádků tabulky na stránce
function vykresliTabulku() {
    let tbody = document.getElementById("vnitrekTabulky");
    tbody.innerHTML = "";

    produkty.forEach((produkt, index) => {
        let radek = document.createElement("tr");
        radek.innerHTML = `
            <td style="text-align:left; padding-left:15%;">${produkt.jmeno}</td>
            <td>${produkt.cena} Kč</td>
            <td><input type="number" min="0" value="0" id="prod_${index}" onchange="prepocet()"></td>
        `;
        tbody.appendChild(radek);
    });
    prepocet();
}

// FUNKCE: Výpočet finální útraty
function prepocet(){
    let celkem = 0;
    produkty.forEach((produkt, index) => {
        let input = document.getElementById(`prod_${index}`);
        if (input) {
            let ks = parseInt(input.value) || 0;
            celkem += (ks * produkt.cena);
        }
    });
    document.getElementById("cena").innerText = celkem;
}

// FUNKCE: Sestavení objednávky a vyvolání e-mailového klienta
function odeslatObjednavku(){
    let jmeno = document.getElementById("jmeno").value.trim();
    let telefon = document.getElementById("telefon").value.trim();
    let email = document.getElementById("email").value.trim();

    if(jmeno === "" || telefon === "" || email === ""){
        alert("Vyplňte prosím všechny osobní údaje.");
        return;
    }

    let celkem = parseInt(document.getElementById("cena").innerText) || 0;
    if(celkem === 0){
        alert("Vyberte si prosím alespoň jeden produkt k objednání.");
        return;
    }

    let zprava =
    "Objednávka z aplikace Bufet na jedničku\n\n" +
    "Jméno: " + jmeno + "\n" +
    "Telefon: " + telefon + "\n" +
    "E-mail: " + email + "\n\n" +
    "Objednané položky:\n";

    produkty.forEach((produkt, index) => {
        let input = document.getElementById(`prod_${index}`);
        if (input) {
            let ks = parseInt(input.value) || 0;
            if (ks > 0) {
                zprava += "- " + produkt.jmeno + ": " + ks + " ks\n";
            }
        }
    });

    zprava += "\nCelková cena objednávky: " + celkem + " Kč";

    window.location.href =
    "mailto:senkerikova.eliska@kostka-skola.cz" +
    "?subject=" + encodeURIComponent("Objednávka z aplikace Bufet na jedničku") +
    "&body=" + encodeURIComponent(zprava);
}

// Spuštění inicializace při otevření stránky
nactiCenik();
</script>

</body>
</html>
