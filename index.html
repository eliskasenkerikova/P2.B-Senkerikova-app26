<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bufet na jedničku</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#fff8ef,#ffe7b8);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    background:white;
    text-align:center;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    margin-bottom:25px;
}

.logo{
    width:250px;
    max-width:100%;
}

h1{
    color:#4a2c0f;
    margin-top:10px;
    font-size:42px;
}

.slogan{
    color:#d99000;
    font-size:18px;
    margin-top:5px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#ffb300;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

input[type="number"]{
    width:80px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
}

.form-group{
    margin-top:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#4a2c0f;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.total{
    margin-top:25px;
    font-size:30px;
    text-align:center;
    font-weight:bold;
    color:#4a2c0f;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#ff9800;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.btn:hover{
    background:#e68900;
}

.csv-loader {
    background: #fdf6e2;
    border: 2px dashed #ffb300;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    text-align: center;
}

.csv-loader input {
    margin-top: 5px;
}

footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<header>
<img src="logo_bufettt.png" alt="Bufet na jedničku" class="logo">
<h1>Bufet na jedničku</h1>
<p class="slogan">Dobrá chuť, lepší den</p>
</header>

<div class="card">

<!-- NAHRÁNÍ CSV Z EXCELU -->
<div class="csv-loader">
    <label style="font-weight: bold; color: #4a2c0f;">Aktualizovat ceník z Excelu (.csv):</label><br>
    <input type="file" id="csvFile" accept=".csv" onchange="nactiSeznamZCsv()">
</div>

<!-- Tabulka se vygeneruje automaticky pomocí JavaScriptu -->
<table id="tabulkaProduktu">
    <thead>
        <tr>
            <th>Produkt</th>
            <th>Cena</th>
            <th>Počet kusů</th>
        </tr>
    </thead>
    <tbody id="vnitrekTabulky">
        <!-- Zde JavaScript doplní řádky -->
    </tbody>
</table>

<div class="total">
Celková cena: <span id="cena">0</span> Kč
</div>

<div class="form-group">
<label for="jmeno">VAŠE JMÉNO</label>
<input type="text" id="jmeno" placeholder="Příjmení Jméno" required>
</div>

<div class="form-group">
<label for="telefon">TELEFON</label>
<input type="tel" id="telefon" placeholder="+420 000 000 000" required>
</div>

<div class="form-group">
<label for="email">E-MAIL</label>
<input type="email" id="email" placeholder="vas.email@example.com" required>
</div>

<button class="btn" onclick="odeslatObjednavku()">
ODESLAT OBJEDNÁVKU
</button>

</div>

<footer>
© 2026 Bufet na jedničku | Školní frontend aplikace
</footer>

</div>

<script>
// Výchozí data pro případ, že uživatel ještě nenahrál CSV soubor
let produkty = [
    { jmeno: "🥪 Sendvič", cena: 45 },
    { jmeno: "🌭 Párek v rohlíku", cena: 35 },
    { jmeno: "🍎 Jablko", cena: 15 },
    { jmeno: "🍫 Tatranka", cena: 30 },
    { jmeno: "🥖 Bageta šunková", cena: 55 },
    { jmeno: "🧃 Ledový čaj", cena: 25 }
];

// Funkce pro vykreslení tabulky na základě pole 'produkty'
function vykresliTabulku() {
    let tbody = document.getElementById("vnitrekTabulky");
    tbody.innerHTML = "";

    produkty.forEach((produkt, index) => {
        let radek = document.createElement("tr");
        radek.innerHTML = `
            <td>${produkt.jmeno}</td>
            <td>${produkt.cena} Kč</td>
            <td><input type="number" min="0" value="0" id="prod_${index}" data-cena="${produkt.cena}" data-jmeno="${produkt.jmeno}" onchange="prepocet()"></td>
        `;
        tbody.appendChild(radek);
    });
    prepocet();
}

// Funkce, která zpracuje nahraný CSV soubor z Excelu
function nactiSeznamZCsv() {
    let fileInput = document.getElementById("csvFile");
    let file = fileInput.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        let text = e.target.result;
        let raddky = text.split("\n");
        let noveProdukty = [];

        // Projdeme řádky (přeskočíme hlavičku i=0)
        for (let i = 1; i < raddky.length; i++) {
            let radek = raddky[i].trim();
            if (radek === "") continue;

            // Excel v češtině odděluje středníkem
            let sloupce = radek.split(";");
            if (sloupce.length >= 2) {
                let nazev = sloupce[0].trim();
                let cenaCislo = parseInt(sloupce[1].replace(/[^0-9]/g, "")) || 0;
                
                noveProdukty.push({
                    jmeno: nazev,
                    cena: cenaCislo
                });
            }
        }

        if (noveProdukty.length > 0) {
            produkty = noveProdukty;
            vykresliTabulku();
        } else {
            alert("Nepodařilo se načíst žádná data. Zkontrolujte formát CSV.");
        }
    };
    reader.readAsText(file, "UTF-8");
}

function prepocet(){
    let celkem = 0;
    // Spočítá cenu přes všechny vygenerované inputy
    produkty.forEach((produkt, index) => {
        let input = document.getElementById(`prod_${index}`);
        if (input) {
            let ks = parseInt(input.value) || 0;
            celkem += (ks * produkt.cena);
        }
    });
    document.getElementById("cena").innerText = celkem;
}

function odeslatObjednavku(){
    let jmeno = document.getElementById("jmeno").value.trim();
    let telefon = document.getElementById("telefon").value.trim();
    let email = document.getElementById("email").value.trim();

    if(jmeno === "" || telefon === "" || email === ""){
        alert("Vyplňte prosím všechny osobní údaje.");
        return;
    }

    let celkem = parseInt(document.getElementById("cena").innerText) || 0;
    if(celkem === 0){
        alert("Vyberte si prosím alespoň jeden produkt k objednání.");
        return;
    }

    let zprava =
    "Objednávka z aplikace Bufet na jedničku\n\n" +
    "Jméno: " + jmeno + "\n" +
    "Telefon: " + telefon + "\n" +
    "E-mail: " + email + "\n\n" +
    "Objednané položky:\n";

    // Dynamické ověření objednaných kusů ze všech načtených položek
    produkty.forEach((produkt, index) => {
        let input = document.getElementById(`prod_${index}`);
        if (input) {
            let ks = parseInt(input.value) || 0;
            if (ks > 0) {
                zprava += `- ${produkt.jmeno}: ${ks} ks\n`;
            }
        }
    });

    zprava += "\nCelková cena objednávky: " + celkem + " Kč";

    window.location.href =
    "mailto:senkerikova.eliska@kostka-skola.cz" +
    "?subject=" + encodeURIComponent("Objednávka z aplikace Bufet na jedničku") +
    "&body=" + encodeURIComponent(zprava);
}

// První vykreslení výchozích dat při načtení stránky
vykresliTabulku();
</script>

</body>
</html>
