<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bufet na jedničku</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#fff8ef,#ffe7b8);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    background:white;
    text-align:center;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    margin-bottom:25px;
}

.logo{
    width:250px;
    max-width:100%;
}

h1{
    color:#4a2c0f;
    margin-top:10px;
    font-size:42px;
}

.slogan{
    color:#d99000;
    font-size:18px;
    margin-top:5px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#ffb300;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

input[type="number"]{
    width:80px;
    padding:8px;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:center;
}

.form-group{
    margin-top:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#4a2c0f;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.total{
    margin-top:25px;
    font-size:30px;
    text-align:center;
    font-weight:bold;
    color:#4a2c0f;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#ff9800;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.btn:hover{
    background:#e68900;
}

footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}

.csv-box{
    margin-bottom:20px;
    padding:15px;
    background:#fff4d6;
    border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<header>

<img src="logo_bufettt.png" alt="Bufet na jedničku" class="logo">

<h1>Bufet na jedničku</h1>

<p class="slogan">
Dobrá chuť, lepší den
</p>

</header>

<div class="card">

<div class="csv-box">
<b>Načíst ceník z CSV:</b><br><br>
<input type="file" id="csvFile" accept=".csv">
</div>

<table>

<tr>
<th>Produkt</th>
<th>Cena</th>
<th>Počet kusů</th>
</tr>

<tr>
<td>🥪 Sendvič</td>
<td id="cena-sendvic">45 Kč</td>
<td><input type="number" min="0" value="0" id="sendvic" onchange="prepocet()"></td>
</tr>

<tr>
<td>🌭 Párek v rohlíku</td>
<td id="cena-parek">35 Kč</td>
<td><input type="number" min="0" value="0" id="parek" onchange="prepocet()"></td>
</tr>

<tr>
<td>🍎 Jablko</td>
<td id="cena-jablko">15 Kč</td>
<td><input type="number" min="0" value="0" id="jablko" onchange="prepocet()"></td>
</tr>

<tr>
<td>🍫 Tatranka</td>
<td id="cena-tatranka">30 Kč</td>
<td><input type="number" min="0" value="0" id="tatranka" onchange="prepocet()"></td>
</tr>

<tr>
<td>🥖 Bageta šunková</td>
<td id="cena-bageta">55 Kč</td>
<td><input type="number" min="0" value="0" id="bageta" onchange="prepocet()"></td>
</tr>

<tr>
<td>🧃 Ledový čaj</td>
<td id="cena-ledovycaj">25 Kč</td>
<td><input type="number" min="0" value="0" id="ledovycaj" onchange="prepocet()"></td>
</tr>

</table>

<div class="total">
Celková cena: <span id="cena">0</span> Kč
</div>

<div class="form-group">
<label>VAŠE JMÉNO</label>
<input type="text" id="jmeno">
</div>

<div class="form-group">
<label>TELEFON</label>
<input type="tel" id="telefon">
</div>

<div class="form-group">
<label>E-MAIL</label>
<input type="email" id="email">
</div>

<button class="btn" onclick="odeslatObjednavku()">
ODESLAT OBJEDNÁVKU
</button>

</div>

<footer>
© 2026 Bufet na jedničku | Školní frontend aplikace
</footer>

</div>

<script>

let ceny = {
    sendvic:45,
    parek:35,
    jablko:15,
    tatranka:30,
    bageta:55,
    ledovycaj:25
};

document.getElementById("csvFile").addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        const csv = event.target.result;
        const radky = csv.split(/\r?\n/);

        for(let i=1;i<radky.length;i++){

            const data = radky[i].split(",");

            if(data.length < 2) continue;

            const produkt = data[0].trim();
            const cena = parseInt(data[1]);

            switch(produkt){

                case "Sendvič":
                    ceny.sendvic = cena;
                    document.getElementById("cena-sendvic").innerText = cena + " Kč";
                    break;

                case "Párek v rohlíku":
                    ceny.parek = cena;
                    document.getElementById("cena-parek").innerText = cena + " Kč";
                    break;

                case "Jablko":
                    ceny.jablko = cena;
                    document.getElementById("cena-jablko").innerText = cena + " Kč";
                    break;

                case "Tatranka":
                    ceny.tatranka = cena;
                    document.getElementById("cena-tatranka").innerText = cena + " Kč";
                    break;

                case "Bageta šunková":
                    ceny.bageta = cena;
                    document.getElementById("cena-bageta").innerText = cena + " Kč";
                    break;

                case "Ledový čaj":
                    ceny.ledovycaj = cena;
                    document.getElementById("cena-ledovycaj").innerText = cena + " Kč";
                    break;
            }
        }

        prepocet();
        alert("Ceník byl načten z CSV.");
    };

    reader.readAsText(file,"UTF-8");
});

function prepocet(){

let sendvic = parseInt(document.getElementById("sendvic").value)||0;
let parek = parseInt(document.getElementById("parek").value)||0;
let jablko = parseInt(document.getElementById("jablko").value)||0;
let tatranka = parseInt(document.getElementById("tatranka").value)||0;
let bageta = parseInt(document.getElementById("bageta").value)||0;
let ledovycaj = parseInt(document.getElementById("ledovycaj").value)||0;

let celkem =
(sendvic * ceny.sendvic) +
(parek * ceny.parek) +
(jablko * ceny.jablko) +
(tatranka * ceny.tatranka) +
(bageta * ceny.bageta) +
(ledovycaj * ceny.ledovycaj);

document.getElementById("cena").innerText = celkem;
}

function odeslatObjednavku(){

let jmeno = document.getElementById("jmeno").value;
let telefon = document.getElementById("telefon").value;
let email = document.getElementById("email").value;

let zprava =
"Jméno: " + jmeno + "\n" +
"Telefon: " + telefon + "\n" +
"Email: " + email + "\n\n" +
"Celková cena: " + document.getElementById("cena").innerText + " Kč";

window.location.href =
"mailto:senkerikova.eliska@kostka-skola.cz?subject=Objednávka&body="
+ encodeURIComponent(zprava);
}

prepocet();

</script>

</body>
</html>
